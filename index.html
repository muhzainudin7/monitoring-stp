<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Monitoring STP — PLN UIP Sulawesi</title>
<link rel="icon" href="favicon.png">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2a78d6">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf-autotable@3.8.2/dist/jspdf.plugin.autotable.min.js"></script>
<style>
:root{
  --page:#f9f9f7; --surface:#fcfcfb;
  --ink:#0b0b0b; --ink-2:#52514e; --ink-3:#898781;
  --grid:#e1e0d9; --border:rgba(11,11,11,.10);
  --accent:#2a78d6; --accent-dark:#1c5cab;
  --ok:#0ca30c; --ok-bg:#e7f6e7;
  --proses:#fab219; --proses-bg:#fdf3dc; --proses-ink:#8a5e00;
  --no:#d03b3b; --no-bg:#fbe9e9;
  --radius:12px;
}
*{margin:0;padding:0;box-sizing:border-box}
html{-webkit-text-size-adjust:100%}
body{
  font-family:system-ui,-apple-system,"Segoe UI",sans-serif;
  background:var(--page); color:var(--ink); font-size:15px; line-height:1.45;
  padding-bottom:calc(64px + env(safe-area-inset-bottom));
}
.wrap{max-width:520px;margin:0 auto;padding:0 12px}

/* ---------- App bar ---------- */
.appbar{position:sticky;top:0;z-index:40;background:var(--surface);border-bottom:1px solid var(--grid)}
.appbar-in{max-width:520px;margin:0 auto;padding:10px 12px;display:flex;align-items:center;gap:8px}
.appbar h1{font-size:16px;font-weight:700;flex:1;line-height:1.2}
.appbar .sub{font-size:11px;color:var(--ink-3);font-weight:400;display:block}
.iconbtn{
  border:1px solid var(--grid);background:var(--surface);color:var(--ink-2);
  width:36px;height:36px;border-radius:10px;font-size:17px;cursor:pointer;flex:none;
  display:flex;align-items:center;justify-content:center;
}
.iconbtn:active{background:var(--page)}
.iconbtn.spin svg{animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.stamp{font-size:11px;color:var(--ink-3);text-align:center;padding:6px 0 0}

/* ---------- Cards ---------- */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-top:12px}

/* ---------- Header hero (gambar + logo) ---------- */
.hero-header{position:relative;margin-top:12px;border-radius:var(--radius);overflow:hidden;
  aspect-ratio:3/1;background:#cfd6dd no-repeat center/cover}
.hero-header img.logo{position:absolute;top:10px;right:10px;height:34px;width:auto;
  filter:drop-shadow(0 1px 3px rgba(0,0,0,.25))}

/* ---------- Chips / filters ---------- */
.chips{display:flex;gap:6px;overflow-x:auto;padding:10px 0 2px;scrollbar-width:none}
.chips::-webkit-scrollbar{display:none}
.chip{border:1px solid var(--grid);background:var(--surface);color:var(--ink-2);border-radius:8px;
  padding:5px 10px;font-size:10.5px;white-space:nowrap;cursor:pointer;flex:none}
.chip.on{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600}
.search{width:100%;margin-top:8px;padding:9px 12px;border:1px solid var(--grid);border-radius:10px;
  font:inherit;font-size:14px;background:var(--surface);color:var(--ink)}
.search::placeholder{color:var(--ink-3)}

/* ---------- Project card ---------- */
.proj .top{display:flex;gap:8px;align-items:flex-start}
.proj h3{font-size:14.5px;font-weight:700;flex:1;line-height:1.3}
.badge{display:inline-block;font-size:11px;font-weight:600;border-radius:999px;padding:2px 9px;white-space:nowrap}
.badge.prog{background:var(--page);border:1px solid var(--grid);color:var(--ink-2);font-variant-numeric:tabular-nums}
.badge.prog.full{background:var(--ok-bg);border-color:var(--ok);color:#006300}
.badge.prog.zero{background:var(--no-bg);border-color:var(--no);color:var(--no)}
.meta{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px}
.badge.upp{background:#e8f0fb;color:var(--accent-dark)}
.badge.kel{background:var(--page);border:1px solid var(--grid);color:var(--ink-2)}
.badge.kel.km26{background:#fdf3dc;border-color:var(--proses);color:var(--proses-ink)}
.badge.tgt{background:var(--page);border:1px solid var(--grid);color:var(--ink-2)}
.docgrid{display:grid;grid-template-columns:repeat(10,1fr) 4px 1fr;gap:3px;margin-top:10px;align-items:stretch}
.docsep{background:var(--grid);border-radius:2px;width:2px;justify-self:center}
.doc{border-radius:5px;padding:4px 0 3px;text-align:center;line-height:1.15}
.doc .s{font-size:11px;font-weight:700;display:block}
.doc .a{font-size:8px;font-weight:600;display:block;transform:scale(.92)}
.doc.OK{background:var(--ok);color:#fff}
.doc.PROSES{background:var(--proses);color:#5c3d00}
.doc.NO{background:var(--no);color:#fff}
.missing{font-size:12.5px;color:var(--ink-2);margin-top:9px}
.missing b{color:var(--no);font-weight:600}
.missing .pr{color:var(--proses-ink)}
.done-note{font-size:12.5px;color:#006300;margin-top:9px;font-weight:600}
.actions{display:flex;gap:8px;margin-top:11px}
.btn{border:0;border-radius:10px;padding:9px 12px;font:inherit;font-size:13.5px;font-weight:600;cursor:pointer;
  display:inline-flex;align-items:center;justify-content:center;gap:6px}
.btn.primary{background:var(--accent);color:#fff;flex:1}
.btn.primary:active{background:var(--accent-dark)}
.btn.ghost{background:var(--surface);border:1px solid var(--grid);color:var(--ink-2);flex:1}
.empty{color:var(--ink-3);text-align:center;padding:32px 0;font-size:14px}

/* ---------- Paginasi ---------- */
.pager{display:flex;gap:6px;justify-content:center;align-items:center;margin:16px 0 4px;flex-wrap:wrap}
.pager button{min-width:36px;height:36px;border:1px solid var(--grid);border-radius:10px;background:var(--surface);
  color:var(--ink-2);font:inherit;font-size:13.5px;font-weight:600;cursor:pointer;padding:0 10px}
.pager button.on{background:var(--accent);border-color:var(--accent);color:#fff}
.pager button:disabled{opacity:.4;cursor:default}
.pager .info{font-size:12px;color:var(--ink-3);width:100%;text-align:center;margin-top:4px}

/* ---------- Rekap ---------- */
h2.sec{font-size:14px;font-weight:700;margin:4px 0 2px}
.card h2.sec{margin:0 0 4px}
.chartbox{position:relative;width:100%}
.rekap-actions{display:flex;gap:10px;margin-top:14px}
.rekap-actions .btn{flex:1;padding:12px}

/* ---------- Halaman Detail ---------- */
.backbar{display:flex;align-items:center;gap:8px;margin-top:12px}
.backbar button{border:1px solid var(--grid);background:var(--surface);border-radius:10px;padding:8px 14px;
  font:inherit;font-size:13.5px;font-weight:600;color:var(--ink-2);cursor:pointer}
.backbar .t{font-size:12px;color:var(--ink-3)}
.pend{border-left:4px solid var(--grid)}
.pend.open{border-left-color:var(--no)}
.pend.close{border-left-color:var(--ok)}
.pend .head{display:flex;gap:8px;align-items:flex-start}
.pend .no{flex:none;width:26px;height:26px;border-radius:8px;background:var(--page);border:1px solid var(--grid);
  display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--ink-2)}
.pend .desc{flex:1;font-size:13.5px;font-weight:600;line-height:1.35}
.pend .sub{font-size:12.5px;font-weight:400;color:var(--ink-2);margin-top:3px}
.pend .stat{flex:none;font-size:11px;font-weight:700;border-radius:999px;padding:3px 10px}
.pend.close .stat{background:var(--ok-bg);color:#006300}
.pend.open .stat{background:var(--no-bg);color:var(--no)}
.pend .when{font-size:12.5px;color:var(--ink-2);margin-top:8px}
.pend .when b{font-weight:600}
.dsum{display:flex;gap:8px;margin-top:12px}
.dsum .b{flex:1;border-radius:var(--radius);padding:10px;text-align:center;border:1px solid var(--border);background:var(--surface)}
.dsum .b .v{font-size:22px;font-weight:700}
.dsum .b .l{font-size:11.5px;color:var(--ink-2)}
.dsum .b.o .v{color:var(--no)} .dsum .b.c .v{color:var(--ok)}
.loading{text-align:center;color:var(--ink-3);padding:28px 0;font-size:13.5px}
.loading .dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--accent);
  margin:0 2px;animation:blink 1s infinite alternate}
.loading .dot:nth-child(2){animation-delay:.3s}.loading .dot:nth-child(3){animation-delay:.6s}
@keyframes blink{from{opacity:.2}to{opacity:1}}
.note{font-size:12px;color:var(--ink-3);margin-top:10px}

/* ---------- Bottom nav ---------- */
.nav{position:fixed;left:0;right:0;bottom:0;background:var(--surface);border-top:1px solid var(--grid);z-index:50;
  padding-bottom:env(safe-area-inset-bottom)}
.nav-in{max-width:520px;margin:0 auto;display:flex}
.nav button{flex:1;border:0;background:none;padding:8px 0 7px;font:inherit;font-size:11px;color:var(--ink-3);cursor:pointer;
  display:flex;flex-direction:column;align-items:center;gap:2px}
.nav button svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.nav button.on{color:var(--accent);font-weight:700}

/* ---------- Toast ---------- */
.toast{position:fixed;left:50%;transform:translateX(-50%);bottom:calc(76px + env(safe-area-inset-bottom));
  background:var(--ink);color:#fff;font-size:13.5px;padding:10px 18px;border-radius:999px;z-index:100;
  opacity:0;transition:opacity .25s;pointer-events:none;max-width:88vw;text-align:center}
.toast.show{opacity:1}

@media(min-width:560px){body{font-size:15px}}
</style>
</head>

function fmtTanggal(iso){
  if(!iso) return '';
  const [y,m,d] = iso.split('-').map(Number);
  return d+' '+BULAN_ID[m].slice(0,3)+' '+y;
}
function fmtWaktu(dt){
  const d = new Date(dt);
  return d.getDate()+' '+BULAN_ID[d.getMonth()+1].slice(0,3)+' '+d.getFullYear()+', '+
    String(d.getHours()).padStart(2,'0')+'.'+String(d.getMinutes()).padStart(2,'0');
}
/* "JUN - 26" → 2026-06-30; "BEYOND"/"KM - SMT 2" → null */
function targetToDate(label){
  if(!label) return null;
  const m = String(label).toUpperCase().match(/([A-Z]{3,4})\s*-?\s*(\d{2,4})/);
  if(!m || !(m[1] in BULAN)) return null;
  let y = Number(m[2]); if(y < 100) y += 2000;
  const mo = BULAN[m[1]];
  const last = new Date(y, mo, 0).getDate();
  return y+'-'+String(mo).padStart(2,'0')+'-'+String(last).padStart(2,'0');
}
function kelompokDariLabel(label){
  const t = String(label||'').toUpperCase();
  if(t.includes('BEYOND')) return 'BEYOND KM 2026';
  if(t.includes('SMT')) return 'KM 2025';
  const d = targetToDate(t);
  if(d) return 'KM '+d.slice(0,4);
  return 'LAINNYA';
}
function normNama(s){ return String(s||'').toLowerCase().replace(/\s+/g,' ').trim(); }
function statusVal(v){
  const t = String(v||'').trim().toUpperCase();
  if(t === 'OK') return 'OK';
  if(t.startsWith('PROSES')) return 'PROSES';
  return 'NO';
}

function itemStatuses(p){ return [...p.docs, p.pendingItem]; }
function itemLabels(){ return [...DOCS.map(d=>d.nama), PENDING_LABEL]; }

function missingItems(p){

  return itemStatuses(p).map((s,i)=> s==='OK' ? null : {nama:labels[i], status:s}).filter(Boolean);
}
/* Serial Excel (mis. 46326) → tanggal; teks lain dikembalikan apa adanya */
function fmtSheetDate(v){
  const t = String(v??'').trim();
  if(!t) return '';
  const m = t.match(/^(\d{5})(\.0+)?$/);
  if(m){
    const n = Number(m[1]);
    if(n > 20000 && n < 60000){
      const d = new Date(Math.round((n - 25569) * 86400000));
      return d.getUTCDate()+' '+BULAN_ID[d.getUTCMonth()+1].slice(0,3)+' '+d.getUTCFullYear();
    }
  }
  return t;
}

/* Parser CSV yang menangani kutip & baris-baru di dalam sel */
function parseCSV(text){
  const rows = []; let row = [], cell = '', q = false;
  for(let i=0;i<text.length;i++){
    const c = text[i];
    if(q){
      if(c === '"'){ if(text[i+1] === '"'){ cell += '"'; i++; } else q = false; }
      else cell += c;
    }else{
      if(c === '"') q = true;
      else if(c === ','){ row.push(cell); cell=''; }
      else if(c === '\n'){ row.push(cell); rows.push(row); row=[]; cell=''; }
      else if(c !== '\r') cell += c;
    }
  }
  if(cell !== '' || row.length){ row.push(cell); rows.push(row); }
  return rows;
}

/* Baca tabel REKAP (baris valid = sel UPP berisi salah satu dari UPPS) */
function parseRekapRows(rows){
  let iUpp=-1, iNama=-1, iTarget=-1, iLink=-1;
  for(const r of rows){
    for(let c=0;c<r.length;c++){
      const h = String(r[c]||'').toUpperCase();
      if(iNama<0 && h.includes('NAMA PROYEK')) iNama = c;
      if(iUpp<0 && h.trim() === 'UPP') iUpp = c;
      if(iTarget<0 && h.trim().startsWith('TARGET') && !h.includes('STP')) iTarget = c;
      if(iLink<0 && h.includes('LINK')) iLink = c;
    }
    if(iNama>=0 && iUpp>=0) break;
  }
  if(iNama<0 || iUpp<0 || iTarget<0) return null;
  const iDoc0 = iTarget + 1;    // 10 kolom dokumen setelah TARGET
  const iPending = iDoc0 + 10;  // kolom PENDING ITEM
  let kelompok = '';
  const out = [];
  for(const r of rows){
    const b = String(r[iUpp-2]||'') + ' ' + String(r[iUpp-1]||'');
    const mKel = b.toUpperCase().match(/TARGET STP.*\d{4}/);
    if(mKel) kelompok = mKel[0].includes('BEYOND') ? 'BEYOND KM '+mKel[0].match(/\d{4}/)[0] : 'KM '+mKel[0].match(/\d{4}/)[0];
    const upp = String(r[iUpp]||'').trim().toUpperCase();
    if(!UPPS.includes(upp)) continue;
    const nama = String(r[iNama]||'').replace(/\s+/g,' ').trim();
    if(!nama) continue;
    const tLabel = String(r[iTarget]||'').replace(/\s+/g,' ').trim();
    out.push({
      nama, upp,
      kelompok: kelompok || kelompokDariLabel(tLabel),
      targetLabel: tLabel,
      target: targetToDate(tLabel),
      linkUpload: iLink>=0 ? String(r[iLink]||'').trim() : '',
      pendingItem: statusVal(r[iPending]),
      docs: DOCS.map((_,k)=> statusVal(r[iDoc0+k])),
    });
  }
  return out.length ? out : null;
}

async function syncFromSheet(manual){
  const btn = $('#btnSync'); btn.classList.add('spin');
  try{
    const res = await fetch(gvizCsvUrl('REKAP'), {cache:'no-store'});
    if(!res.ok) throw new Error('HTTP '+res.status);
    const proyek = parseRekapRows(parseCSV(await res.text()));
    if(!proyek) throw new Error('Sheet REKAP tidak terbaca');
    proyek.forEach((p,i)=> p.id = i);
    state.projects = proyek;
    state.lastSync = Date.now();
    save(); renderRoute();
    if(manual) toast('Data diperbarui: '+proyek.length+' proyek dari spreadsheet.');
  }catch(err){
    if(manual){
      const hint = location.protocol === 'file:'
        ? ' Catatan: saat dibuka langsung dari file, browser memblokir pengambilan data — gunakan versi online (lihat PANDUAN).'
        : ' Periksa koneksi internet.';
      toast('Gagal memuat data: '+err.message+'.'+hint, 5000);
    }
  }finally{
    btn.classList.remove('spin'); renderStamp();
  }
}

function renderDaftar(){

async function muatRincian(p){
  const body = $('#detailBody');
  const sheetName = SHEET_MAP[normNama(p.nama)] || p.nama;
  try{
    let data = detailCache[sheetName];
    if(!data){
      const res = await fetch(gvizCsvUrl(sheetName), {cache:'no-store'});
      if(!res.ok) throw new Error('HTTP '+res.status);
      data = parsePendingSheet(parseCSV(await res.text()));
      if(!data) throw new Error('format sheet tidak dikenali');
      detailCache[sheetName] = data;
    }
    if(String(location.hash) !== '#p/'+p.id) return; // pengguna sudah pindah halaman
    renderRincian(body, data);
  }catch(err){
    if(String(location.hash) !== '#p/'+p.id) return;
    const alasan = location.protocol==='file:'
      ? 'Rincian hanya bisa dimuat pada versi online (browser memblokir pengambilan data dari file lokal).'
      : 'Rincian belum tersedia untuk proyek ini ('+esc(err.message)+').';
    body.innerHTML = `<div class="card"><div class="empty" style="padding:16px 0">${alasan}</div>
      <div class="note">Status kelengkapan 11 item di atas tetap sesuai sheet REKAP.</div></div>`;

}

/* Parse sheet per-proyek: ambil HANYA bagian "Pending Item & Catatan Hasil Invent STOP-STAP".
   Kolom (hasil gviz): 1=No, 2=Deskripsi, 3=Deadline, 4=PIC, 5=Checklist(v/x), 6=Tgl Diserahkan, 7=Ket. */
function parsePendingSheet(rows){
  if(!rows.length) return null;
  const headText = (rows[0]||[]).join(' ');
  if(!/deskripsi/i.test(headText)) return null;
  const mUpd = headText.match(/update\s*:\s*([0-9]{1,2}\s+[A-Za-z]+\s+\d{4})/i);
  const items = [];
  for(let i=1;i<rows.length;i++){
    const r = rows[i];
    const no = String(r[1]||'').trim();
    const desc = String(r[2]||'').replace(/\s+/g,' ').trim();
    if(/^(STOP|STAP|STP)$/i.test(no)) break;            // baris status penutup
    if(no.startsWith('*)') || desc.startsWith('*)')) break; // baris catatan kaki
    if(/kelengkapan\s+dokumen\s+stp/i.test(desc)) break; // bagian kedua tidak ditampilkan
    if(!desc) continue;
    if(desc.startsWith('-') && items.length){
      items[items.length-1].subs.push(desc.replace(/^-\s*/,''));
      continue;
    }
    const cek = String(r[5]||'').trim().toLowerCase();
    const deadlineRaw = String(r[3]||'').trim();
    const close = cek.startsWith('v') || /^close/i.test(deadlineRaw);
    items.push({
      no: no ? String(parseInt(no,10) || no) : String(items.length+1),
      desc, subs: [],
      close,
      deadline: /^close/i.test(deadlineRaw) ? '' : fmtSheetDate(deadlineRaw),
      selesai: fmtSheetDate(r[6]),
    });
  }
  return { update: mUpd ? mUpd[1] : '', items };
}

function renderRincian(body, data){
  const open = data.items.filter(x=>!x.close).length;
  const close = data.items.length - open;
  if(!data.items.length){
    body.innerHTML = '<div class="card"><div class="empty" style="padding:16px 0">Tidak ada butir pending item pada sheet proyek ini.</div></div>';
    return;
  }
  body.innerHTML = `
    <div class="dsum">
      <div class="b o"><div class="v">${open}</div><div class="l">Open</div></div>
      <div class="b c"><div class="v">${close}</div><div class="l">Close</div></div>
    </div>
    ${data.items.map(it=>`
      <div class="card pend ${it.close?'close':'open'}">
        <div class="head">
          <span class="no">${esc(it.no)}</span>
          <div class="desc">${esc(it.desc)}${it.subs.map(s=>`<div class="sub">– ${esc(s)}</div>`).join('')}</div>
          <span class="stat">${it.close?'CLOSE':'OPEN'}</span>
        </div>
        ${it.close
          ? (it.selesai?`<div class="when">Completion: <b>${esc(it.selesai)}</b></div>`:'')
          : (it.deadline?`<div class="when">Deadline: <b>${esc(it.deadline)}</b></div>`:'')}
      </div>`).join('')}
    ${data.update?`<div class="note">Update data pending item: ${esc(data.update)} · Sumber: sheet proyek pada spreadsheet monitoring.</div>`:''}`;
}

/* ================= Tab Rekap ================= */
function hitungRekap(){
  const ps = state.projects, total = ps.length;
  const totOK = ps.reduce((a,p)=>a+okCount(p),0);
  const done = ps.filter(isDone).length;
  const none = ps.filter(p=>okCount(p)===0).length;
  const proses = total - done - none;
  const labels = itemLabels();
  // Pareto: jumlah proyek yang kurang per item, urut menurun
  const hambat = labels.map((nm,i)=>({nama:nm, i, n: ps.filter(p=>itemStatuses(p)[i]!=='OK').length}))
    .filter(x=>x.n>0).sort((a,b)=>b.n-a.n);
  // Kekurangan per UPP: urutan item mengikuti pareto & skala sumbu disamakan agar 4 grafik mudah dibandingkan
  let maxKurang = 0;
  const perUppKurang = UPPS.map(u=>{
    const g = ps.filter(p=>p.upp===u);
    if(!g.length) return null;
    const items = hambat.map(h=>({nama:h.nama, n: g.filter(p=>itemStatuses(p)[h.i]!=='OK').length}));
    maxKurang = Math.max(maxKurang, ...items.map(x=>x.n));
    return {upp:u, nProyek:g.length, items};
  }).filter(Boolean);
  return {total, totOK, done, none, proses, pct: total?Math.round(totOK/(total*TOTAL_ITEM)*100):0,
          hambat, perUppKurang, maxKurang};
}

function renderRekap(){
  const r = hitungRekap();
  $('#tab-rekap').innerHTML = `
    ${r.perUppKurang.map(u=>`
    <div class="card"><h2 class="sec">Kekurangan Dokumen — UPP ${esc(u.upp)}</h2>
      <div style="font-size:12px;color:var(--ink-3);margin-bottom:4px">Jumlah proyek (dari ${u.nProyek}) yang masih kurang per jenis item</div>
      <div class="chartbox" style="height:${26*u.items.length+40}px"><canvas id="chUpp-${esc(u.upp)}"></canvas></div></div>`).join('')}
    <div class="card"><h2 class="sec">Pareto Kekurangan Dokumen</h2>
      <div style="font-size:12px;color:var(--ink-3);margin-bottom:4px">Jumlah proyek (seluruh UPP) yang masih kekurangan tiap jenis item, urut terbanyak</div>
      <div class="chartbox" style="height:${30*r.hambat.length+40}px"><canvas id="chDok"></canvas></div></div>
    <div class="rekap-actions">
      <button class="btn primary" id="btnPDF">📄 Ekspor PDF</button>
      <button class="btn ghost" id="btnShare">Bagikan</button>
    </div>`;
  r.perUppKurang.forEach(u=>buatChartKurangUpp('chUpp-'+u.upp, u.items, r.maxKurang, false));
  buatChartDok('chDok', r.hambat, false);
  $('#btnPDF').addEventListener('click', eksporPDF);
  $('#btnShare').addEventListener('click', bagikan);
}

const CHART_INK = '#52514e', CHART_MUTED = '#898781', CHART_GRID = '#e1e0d9';
function chartDefaults(){
  Chart.defaults.font.family = 'system-ui,-apple-system,"Segoe UI",sans-serif';
  Chart.defaults.color = CHART_MUTED;
}
/* Grafik kekurangan 11 item milik SATU UPP; sumbu-x sama (maxX) di keempat grafik agar sebanding */
function buatChartKurangUpp(canvasId, items, maxX, forPdf){
  chartDefaults();
  if(charts[canvasId]) charts[canvasId].destroy();
  charts[canvasId] = new Chart(document.getElementById(canvasId), {
    type:'bar',
    data:{ labels: items.map(x=>x.nama),
      datasets:[{ data: items.map(x=>x.n), backgroundColor:'#2a78d6',
        borderRadius:{topRight:4,bottomRight:4}, borderSkipped:'start',
        barThickness: forPdf?14:11, maxBarThickness:16 }]},
    options:{
      indexAxis:'y', responsive:!forPdf, maintainAspectRatio:false,
      animation: forPdf?false:{duration:300}, devicePixelRatio: forPdf?2:undefined,
      layout:{padding:{right:30}},
      plugins:{legend:{display:false}, tooltip:{enabled:!forPdf,
        callbacks:{label:c=>c.parsed.x+' proyek masih kurang'}}},
      scales:{
        x:{min:0,max:Math.max(2,maxX),grid:{color:CHART_GRID,drawTicks:false},border:{color:CHART_GRID},
           ticks:{precision:0,color:CHART_MUTED,font:{size:11}}},
        y:{grid:{display:false},border:{display:false},ticks:{color:CHART_INK,font:{size:11}}}
      }
    },
    plugins:[nilaiUjung(v=>v||'')]
  });
}
function buatChartDok(canvasId, hambat, forPdf){
  chartDefaults();
  if(charts[canvasId]) charts[canvasId].destroy();
  charts[canvasId] = new Chart(document.getElementById(canvasId), {
    type:'bar',
    data:{ labels: hambat.map(x=>x.nama),
      datasets:[{ data: hambat.map(x=>x.n), backgroundColor:'#1baf7a',
        borderRadius:{topRight:4,bottomRight:4}, borderSkipped:'start',
        barThickness: forPdf?18:14, maxBarThickness:20 }]},
    options:{
      indexAxis:'y', responsive:!forPdf, maintainAspectRatio:false,
      animation: forPdf?false:{duration:300}, devicePixelRatio: forPdf?2:undefined,
      layout:{padding:{right:34}},
      plugins:{legend:{display:false}, tooltip:{enabled:!forPdf,
        callbacks:{label:c=>c.parsed.x+' proyek masih kurang'}}},
      scales:{
        x:{min:0,grid:{color:CHART_GRID,drawTicks:false},border:{color:CHART_GRID},
           ticks:{precision:0,color:CHART_MUTED,font:{size:11}}},
        y:{grid:{display:false},border:{display:false},ticks:{color:CHART_INK,font:{size:11}}}
      }
    },
    plugins:[nilaiUjung(v=>v)]
  });
}
function nilaiUjung(fmt){
  return { id:'nilaiUjung', afterDatasetsDraw(chart){
    const {ctx} = chart;
    ctx.save(); ctx.fillStyle = CHART_INK;
    ctx.font = '600 11px system-ui,-apple-system,"Segoe UI",sans-serif';
    ctx.textBaseline = 'middle';
    chart.getDatasetMeta(0).data.forEach((bar,i)=>{
      ctx.fillText(fmt(chart.data.datasets[0].data[i]), bar.x+6, bar.y);
    });
    ctx.restore();
  }};
}

function bagikan(){
  const r = hitungRekap();
  const km = state.projects.filter(p=>p.kelompok==='KM 2026');
  const now = new Date();
  let teks = 'Rekap Monitoring Dokumen STP UIP Sulawesi — '+BULAN_ID[now.getMonth()+1]+' '+now.getFullYear()+'\n'+
    'Kelengkapan: '+r.pct+'% ('+r.totOK+'/'+(r.total*TOTAL_ITEM)+' item, '+r.total+' proyek)\n'+
    'Selesai: '+r.done+' · Proses: '+r.proses+' · Belum jalan: '+r.none+'\n'+
    'Target STP (KM) 2026:\n'+
    km.map(p=>'• '+p.nama+' — '+okCount(p)+'/'+TOTAL_ITEM).join('\n');
  if(navigator.share) navigator.share({title:'Rekap Monitoring STP', text:teks}).catch(()=>{});
  else window.open('https://wa.me/?text='+encodeURIComponent(teks),'_blank');
}

/* ================= Ekspor PDF ================= */
async function eksporPDF(){
  toast('Menyusun PDF…');
  const r = hitungRekap();
  const holder = document.createElement('div');
  holder.style.cssText = 'position:fixed;left:-2000px;top:0;background:#fff';
  holder.innerHTML = '<canvas id="pdfDok" width="760" height="'+(r.hambat.length*30+50)+'"></canvas>'+
    r.perUppKurang.map((u,i)=>'<canvas id="pdfU'+i+'" width="380" height="'+(u.items.length*24+44)+'"></canvas>').join('');
  document.body.appendChild(holder);
  buatChartDok('pdfDok', r.hambat, true);
  r.perUppKurang.forEach((u,i)=>buatChartKurangUpp('pdfU'+i, u.items, r.maxKurang, true));
  await new Promise(res=>setTimeout(res,80));

  const {jsPDF} = window.jspdf;
  const doc = new jsPDF({unit:'mm',format:'a4',compress:true});
  const W = 210, M = 14;
  const now = new Date();
  const periode = BULAN_ID[now.getMonth()+1]+' '+now.getFullYear();

  doc.setFont('helvetica','bold'); doc.setFontSize(13);
  doc.text('PT PLN (PERSERO) - UIP SULAWESI', W/2, 16, {align:'center'});
  doc.setFontSize(11.5);
  doc.text('Laporan Rekap Monitoring Kelengkapan Dokumen STP', W/2, 23, {align:'center'});
  doc.setFont('helvetica','normal'); doc.setFontSize(10);
  doc.setTextColor(90); doc.text('Periode: '+periode, W/2, 29, {align:'center'});
  doc.setDrawColor(42,120,214); doc.setLineWidth(.7); doc.line(M, 32.5, W-M, 32.5);

  doc.setTextColor(0);
  const ring = [
    ['Total proyek', String(r.total)],
    ['Kelengkapan', r.pct+'% ('+r.totOK+'/'+(r.total*TOTAL_ITEM)+' item)'],
    ['Selesai', String(r.done)], ['Proses', String(r.proses)], ['Belum jalan', String(r.none)],
  ];
  const bw = (W-2*M)/ring.length;
  ring.forEach((it,i)=>{
    const x = M + i*bw;
    doc.setFillColor(249,249,247); doc.setDrawColor(215); doc.setLineWidth(.2);
    doc.roundedRect(x+1, 36, bw-2, 15, 1.5, 1.5, 'FD');
    doc.setFont('helvetica','bold'); doc.setFontSize(11); doc.text(it[1], x+bw/2, 43, {align:'center'});
    doc.setFont('helvetica','normal'); doc.setFontSize(7.5); doc.setTextColor(90);
    doc.text(it[0], x+bw/2, 48, {align:'center'}); doc.setTextColor(0);
  });

  let y = 57;
  doc.setFont('helvetica','bold'); doc.setFontSize(10);
  doc.text('Pareto Kekurangan Dokumen (jumlah proyek yang masih kurang, seluruh UPP)', M, y);
  const c2 = document.getElementById('pdfDok');
  let h2 = (W-2*M) * c2.height / c2.width;
  doc.addImage(c2.toDataURL('image/png'), 'PNG', M, y+2, W-2*M, h2);
  y += h2 + 10;

  // Kekurangan per UPP: 4 grafik dalam susunan 2 kolom
  doc.text('Kekurangan Dokumen per UPP', M, y); y += 3;
  const colW = (W - 2*M - 6) / 2;
  for(let i=0; i<r.perUppKurang.length; i+=2){
    const pair = r.perUppKurang.slice(i, i+2);
    const imgs = pair.map((u,j)=>{
      const c = document.getElementById('pdfU'+(i+j));
      return {u, c, h: colW * c.height / c.width};
    });
    const rowH = Math.max(...imgs.map(x=>x.h)) + 8;
    if(y + rowH > 272){ doc.addPage(); y = 18; }
    imgs.forEach((x,j)=>{
      const px = M + j*(colW+6);
      doc.setFont('helvetica','bold'); doc.setFontSize(8.5);
      doc.text('UPP '+x.u.upp, px, y+3);
      doc.addImage(x.c.toDataURL('image/png'), 'PNG', px, y+5, colW, x.h);
    });
    y += rowH + 2;
  }
  y += 4;
  doc.setFontSize(10);

  const kolom = ['No','Nama Proyek','UPP','Target','Progres','Item Kurang'];
  const barisProyek = (p,i)=>[String(i+1), p.nama, p.upp, p.targetLabel||'-', okCount(p)+'/'+TOTAL_ITEM,
    missingItems(p).map(m=>m.nama+(m.status==='PROSES'?' (proses)':'')).join(', ')||'-'];
  const body = [];
  const km26 = state.projects.filter(p=>p.kelompok==='KM 2026');
  if(km26.length){
    body.push([{content:'TARGET STP (KM) 2026', colSpan:6, styles:{fillColor:[253,243,220], textColor:[138,94,0], fontStyle:'bold'}}]);
    km26.forEach((p,i)=>body.push(barisProyek(p,i)));
  }
  const sisa = state.projects.filter(p=>p.kelompok!=='KM 2026');
  UPPS.forEach(u=>{
    const g = sisa.filter(p=>p.upp===u);
    if(!g.length) return;
    body.push([{content:'UPP '+u+' — proyek lainnya ('+g.length+')', colSpan:6, styles:{fillColor:[232,240,251], textColor:[28,92,171], fontStyle:'bold'}}]);
    g.forEach((p,i)=>body.push(barisProyek(p,i)));
  });
  if(y > 250){ doc.addPage(); y = 18; }
  doc.autoTable({
    startY:y, head:[kolom], body,
    margin:{left:M, right:M, bottom:24},
    styles:{font:'helvetica', fontSize:7.4, cellPadding:1.6, lineColor:[225,224,217], lineWidth:.15, textColor:[11,11,11]},
    headStyles:{fillColor:[42,120,214], textColor:255, fontSize:7.6, fontStyle:'bold'},
    columnStyles:{0:{cellWidth:8}, 1:{cellWidth:60}, 2:{cellWidth:17}, 3:{cellWidth:18}, 4:{cellWidth:14}, 5:{cellWidth:'auto'}},
    didParseCell(d){ if(d.section==='body' && d.column.index===4 && d.cell.raw===TOTAL_ITEM+'/'+TOTAL_ITEM) d.cell.styles.textColor=[12,163,12]; },
  });

  const nPages = doc.getNumberOfPages();
  for(let i=1;i<=nPages;i++){
    doc.setPage(i);
    doc.setDrawColor(215); doc.setLineWidth(.2); doc.line(M, 282, W-M, 282);
    doc.setFont('helvetica','italic'); doc.setFontSize(7.2); doc.setTextColor(110);
    doc.text('Laporan Otomatis by Sub-Bidang Administrasi Teknik.', M, 286.5);
    doc.text('Sumber data: Monitoring Kelengkapan Dokumen STP UIP Sulawesi.', M, 290.5);
    doc.setFont('helvetica','normal');
    doc.text('Dibuat '+fmtWaktu(Date.now()), W-M, 286.5, {align:'right'});
    doc.text('Hal. '+i+'/'+nPages, W-M, 290.5, {align:'right'});
  }
  doc.save('Rekap-Monitoring-STP-'+now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0')+'.pdf');

  Object.keys(charts).filter(k=>k.startsWith('pdf')).forEach(k=>{ charts[k].destroy(); delete charts[k]; });
  holder.remove();
  toast('PDF berhasil dibuat.');
}
